<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizZip</title>
  <link rel="icon" type="image/x-icon" href="./favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Monoton&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
</head>
<body>
  <div id="app">
    <header class="site-header">
      <a href="./" class="site-title">QuizZip</a>
      <p class="site-subtitle">Static quizzes, one shareable link.</p>
    </header>

    <!-- Quiz Creator View -->
    <div id="creator-view" class="view hidden">
      <h1>Create a Quiz</h1>

      <div class="form-group">
        <label>
          <input type="checkbox" id="show-answer-toggle" checked>
          Show the correct answer after each question
        </label>
      </div>

      <div class="form-group">
        <label>
          <input type="checkbox" id="show-final-results-toggle" checked>
          Show final score and correct answers at the end
        </label>
      </div>

      <div id="questions-container"></div>

      <button id="add-question-btn" class="btn btn-secondary">+ Add Question</button>

      <div class="actions">
        <button id="generate-link-btn" class="btn btn-primary">Generate Quiz Link</button>
      </div>

      <div id="link-output" class="hidden">
        <h2>Your Quiz Link</h2>
        <p id="link-message" class="link-message hidden"></p>
        <input type="text" id="quiz-link" readonly>
        <button id="copy-link-btn" class="btn btn-secondary">Copy</button>
      </div>
    </div>

    <!-- Quiz Hosting View -->
    <div id="quiz-view" class="view hidden">
      <div id="quiz-start">
        <h1 id="quiz-title">Quiz</h1>
        <p id="quiz-info"></p>
        <button id="start-quiz-btn" class="btn btn-primary">Start Quiz</button>
      </div>

      <div id="quiz-question" class="hidden">
        <div class="progress-bar">
          <span id="progress-text"></span>
        </div>
        <h2 id="question-text"></h2>
        <img id="question-image" class="hidden" alt="Question image">
        <p id="question-image-attribution" class="question-image-attribution hidden"></p>
        <div id="answer-area"></div>
        <button id="submit-answer-btn" class="btn btn-primary">Submit</button>
        <div id="feedback" class="hidden"></div>
        <button id="next-question-btn" class="btn btn-secondary hidden">Next</button>
      </div>

      <div id="quiz-results" class="hidden">
        <h1>Quiz Complete!</h1>
        <p id="score-text"></p>
        <div id="results-breakdown"></div>
        <button id="restart-btn" class="btn btn-secondary">Restart Quiz</button>
        <a id="create-new-link" href="" class="btn btn-primary">Create Your Own Quiz</a>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
